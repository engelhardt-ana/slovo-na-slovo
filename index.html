<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слово на слово</title>
<meta name="description" content="Игра за припрему читања на српском: слова, слогови, гласови и вежбе за родитеље и логопеде.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-512.png">
<meta property="og:type" content="website">
<meta property="og:title" content="Слово на слово">
<meta property="og:description" content="Игра за припрему читања на српском: слова, слогови, гласови и вежбе за родитеље и логопеде.">
<meta property="og:url" content="https://engelhardt-ana.github.io/slovo-na-slovo/">
<meta property="og:image" content="https://engelhardt-ana.github.io/slovo-na-slovo/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Слово на слово">
<meta name="twitter:description" content="Игра за припрему читања на српском: слова, слогови, гласови и вежбе за родитеље и логопеде.">
<meta name="twitter:image" content="https://engelhardt-ana.github.io/slovo-na-slovo/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#Eef3fb;
    --ink:#26324b;
    --ink-soft:#5b6a8c;
    --card:#ffffff;
    --red:#e5484d;
    --blue:#3a6ea5;
    --yellow:#ffc94d;
    --green:#3fb98a;
    --purple:#8b6fc9;
    --radius:18px;
    --shadow:0 4px 0 rgba(38,50,75,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;flex-direction:column;
    min-height:100vh;
  }
  button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
  button:focus-visible{outline:3px solid var(--blue);outline-offset:2px}

  /* ---------- header ---------- */
  header{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 16px 6px;
  }
  .logo{
    font-weight:900;font-size:clamp(20px,4vw,28px);letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;
  }
  .logo .cube{
    display:inline-grid;place-items:center;
    width:1.5em;height:1.5em;border-radius:10px;
    background:var(--yellow);color:var(--ink);
    transform:rotate(-6deg);box-shadow:var(--shadow);
    font-size:.9em;
  }
  .spacer{flex:1}
  .toggle{
    display:flex;background:#dde6f4;border-radius:999px;padding:4px;gap:2px;flex-wrap:wrap;
  }
  .toggle button{
    padding:8px 13px;border-radius:999px;font-weight:800;font-size:14px;
    color:var(--ink-soft);transition:.15s;white-space:nowrap;
  }
  .toggle button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 0 rgba(38,50,75,.1)}
  .modebar{padding:4px 16px 10px;display:flex;justify-content:center}
  .mobile-toggle{
    display:none;
    margin:0 16px 10px;
    padding:10px 14px;border-radius:14px;
    background:#eef2fa;color:var(--ink);
    font-weight:900;box-shadow:var(--shadow);
    justify-content:center;align-items:center;gap:8px;
  }
  @media (max-width:720px){
    header{padding:8px 12px 4px}
    .modebar.collapsed{display:none}
    .mobile-toggle{display:flex}
    .modebar{padding:0 12px 8px}
    #modeToggle{border-radius:22px;justify-content:flex-start}
  }

  /* ---------- alphabet ---------- */
  .alphabet-toggle{
    display:none;
    margin:0 16px 10px;
    padding:10px 14px;border-radius:14px;
    background:var(--blue);color:#fff;
    font-weight:900;box-shadow:var(--shadow);
    justify-content:center;align-items:center;gap:8px;
  }
  .words-toggle{
    display:none;
    margin:0 12px 10px;
    padding:9px 12px;border-radius:14px;
    background:#eef2fa;color:var(--ink);
    font-weight:900;box-shadow:var(--shadow);
    justify-content:center;align-items:center;gap:8px;
  }
  .alphabet{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(46px,1fr));
    gap:8px;padding:2px 16px 12px;
  }
  .abc{
    aspect-ratio:1;border-radius:14px;
    background:var(--card);
    font-weight:900;font-size:clamp(17px,3.4vw,24px);
    box-shadow:var(--shadow);
    transition:transform .12s, background .15s, color .15s;
    display:grid;place-items:center;line-height:1;
  }
  .abc:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(38,50,75,.12)}
  .abc.sel{background:var(--blue);color:#fff;transform:rotate(-4deg) scale(1.06)}
  .abc.inword{background:var(--yellow);color:var(--ink)}
  .abc.sel.inword{background:var(--blue);color:var(--yellow)}
  @media (max-width:720px){
    .alphabet-toggle{display:flex}
    .words-toggle{display:flex}
    .alphabet.collapsed{display:none}
    .alphabet{max-height:18vh;overflow:auto;padding-bottom:8px}
  }

  /* ---------- main layout ---------- */
  main{
    flex:1;display:grid;gap:14px;
    grid-template-columns:230px 1fr;
    padding:0 16px 16px;align-items:start;
    min-height:0;
  }
  main.nolist{grid-template-columns:1fr}
  @media (max-width:720px){ main{grid-template-columns:1fr;gap:10px;padding:0 12px 12px} }

  /* word list */
  .wordlist{
    background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:12px;
    display:flex;flex-direction:column;gap:8px;
    max-height:calc(100vh - 190px);overflow:auto;
  }
  @media (max-width:720px){
    .wordlist{
      max-height:none;
      padding:9px;
      overflow-x:auto;
      overflow-y:hidden;
      flex-direction:row;
      align-items:stretch;
      gap:8px;
      scroll-snap-type:x proximity;
    }
    .wordlist.collapsed{display:none}
    .wordlist h2{flex:0 0 122px;align-self:center;line-height:1.25}
    .resetbtn{flex:0 0 auto;align-self:center}
    .chip{
      flex:0 0 clamp(132px,42vw,170px);
      min-height:54px;
      padding:8px 10px;
      font-size:15px;
      border-radius:11px;
      scroll-snap-align:start;
    }
    .stage{min-height:220px;padding:14px 12px;gap:12px}
    .picture{width:min(170px,50vw);min-height:90px;border-radius:16px}
    .bigemo{font-size:clamp(44px,12vw,66px)}
    .lbox{min-width:52px;height:58px;border-radius:14px;font-size:clamp(24px,8vw,34px)}
    .boxes.compact{gap:7px}
    .boxes.compact .lbox{min-width:44px;height:52px;padding:0 9px;font-size:clamp(22px,7vw,30px)}
    .btnrow{gap:8px}
    .speakbtn{font-size:14px;padding:9px 12px}
    .answer{padding:8px 10px;font-size:14px}
    .adult{font-size:13.5px;padding:10px 12px}
    .placeholder{padding:18px 10px}
  }
  .wordlist h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft)}
  .chip{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:12px;
    background:#f2f6fc;font-weight:800;font-size:17px;text-align:left;
    transition:.12s;
    width:100%;
  }
  .chip:active{transform:scale(.97)}
  .chip.sel{background:var(--blue);color:#fff}
  .chip .emo{font-size:22px;flex:0 0 auto}
  .chip .wordtxt{flex:1;min-width:0;overflow-wrap:normal;word-break:normal;line-height:1.15}
  .chip.long .wordtxt{font-size:.88em}
  .chip.verylong .wordtxt{font-size:.78em;overflow-wrap:anywhere}
  .chip .ck{flex:0 0 auto;margin-left:auto;font-size:15px;color:var(--green);opacity:0;transform:scale(.5);transition:.2s}
  .chip.done .ck{opacity:1;transform:scale(1)}
  .chip.sel .ck{color:#bff5df}
  .hint-empty{color:var(--ink-soft);font-weight:600;font-size:15px;padding:8px 4px}

  /* ---------- stage ---------- */
  .stage{
    background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px 18px;min-height:320px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
    position:relative;overflow:hidden;
  }
  .picture{
    width:min(210px,64vw);min-height:116px;
    border-radius:18px;
    display:grid;place-items:center;
    background:linear-gradient(180deg,#dff1ff 0%,#ffffff 100%);
    box-shadow:inset 0 -4px 0 rgba(38,50,75,.08), var(--shadow);
    position:relative;overflow:hidden;
  }
  .picture::before,.picture::after{
    content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.82);
  }
  .picture::before{width:70px;height:24px;left:18px;top:24px}
  .picture::after{width:96px;height:32px;right:18px;bottom:22px}
  .bigemo{font-size:clamp(56px,12vw,88px);line-height:1;z-index:1}
  .boxes{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
  .lbox{
    min-width:62px;height:70px;padding:0 12px;
    border-radius:16px;
    display:grid;place-items:center;
    font-weight:900;font-size:clamp(26px,6vw,40px);
    background:var(--yellow);color:var(--ink);
    box-shadow:0 5px 0 rgba(38,50,75,.18);
    transition:transform .12s;
  }
  .lbox:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(38,50,75,.18)}
  .lbox:nth-child(2n){transform:rotate(2deg)}
  .lbox:nth-child(3n){transform:rotate(-2deg)}
  .lbox.slot{background:#e7edf7;color:transparent;box-shadow:inset 0 3px 0 rgba(38,50,75,.08)}
  .lbox.filled{background:var(--green);color:#fff;animation:pop .25s}
  .lbox.wrong{animation:shake .3s}
  .lbox.syll{background:var(--purple);color:#fff;min-width:80px;font-size:clamp(22px,5vw,32px)}
  @keyframes pop{0%{transform:scale(.6)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  .speakbtn{
    display:flex;align-items:center;gap:8px;
    background:var(--red);color:#fff;
    font-weight:900;font-size:17px;
    padding:11px 20px;border-radius:999px;
    box-shadow:0 4px 0 #b03338;
    transition:.12s;
  }
  .speakbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #b03338}
  .speakbtn.alt{background:var(--blue);box-shadow:0 4px 0 #2b527b}
  .speakbtn.purp{background:var(--purple);box-shadow:0 4px 0 #6b52a3}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  .tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
  .tile{
    min-width:58px;height:64px;padding:0 12px;border-radius:16px;
    display:grid;place-items:center;
    font-weight:900;font-size:clamp(24px,5.5vw,36px);
    background:var(--card);color:var(--ink);
    border:3px solid #dfe7f3;
    box-shadow:var(--shadow);
    transition:.12s;
  }
  .tile:active{transform:translateY(3px)}
  .tile.used{opacity:0;pointer-events:none;transform:scale(.4)}
  .tile.good{background:var(--green);color:#fff;border-color:var(--green)}
  .tile.emobtn{font-size:44px;min-width:80px;height:88px;border-radius:20px}

  .adult{
    margin-top:auto;width:100%;
    background:#f6f9ff;border-radius:14px;
    padding:12px 14px;font-size:14.5px;font-weight:600;color:var(--ink-soft);
    border-left:5px solid var(--yellow);
  }
  .adult b{color:var(--ink)}
  .answer{
    width:100%;
    border:3px dashed #d7e1ef;
    border-radius:14px;
    padding:10px 12px;
    color:var(--ink-soft);
    font-weight:800;
    text-align:center;
    background:#fbfdff;
  }
  .answer b{color:var(--ink);font-size:1.2em}
  .exercise-list{
    width:100%;display:grid;gap:12px;
  }
  .exercise-card{
    width:100%;
    border-radius:14px;
    background:#f6f9ff;
    border-left:5px solid var(--purple);
    padding:14px;
    color:var(--ink-soft);
    font-weight:700;
  }
  .exercise-card h3{
    color:var(--ink);
    font-size:clamp(18px,3.6vw,23px);
    margin-bottom:8px;
  }
  .exercise-card p{margin-top:8px;line-height:1.45}
  .exercise-card b{color:var(--ink)}

  .placeholder{
    display:flex;flex-direction:column;align-items:center;gap:12px;
    color:var(--ink-soft);font-weight:700;text-align:center;padding:30px 10px;
  }
  .placeholder .arrow{font-size:40px}

  .praise{
    font-size:clamp(22px,5vw,30px);font-weight:900;color:var(--green);
    animation:pop .4s;text-align:center;
  }
  .nextbtn{
    background:var(--green);color:#fff;font-weight:900;font-size:17px;
    padding:11px 22px;border-radius:999px;box-shadow:0 4px 0 #2c8b66;
  }
  .nextbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #2c8b66}
  .resetbtn{
    margin-top:2px;
    background:#fff4dc;color:var(--ink);
    border:2px solid #ffd978;
    padding:9px 12px;border-radius:12px;
    font-weight:900;text-align:center;
  }
  .celebration{
    position:fixed;inset:0;z-index:20;
    display:none;place-items:center;
    background:rgba(38,50,75,.28);
    padding:18px;
  }
  .celebration.show{display:grid}
  .celebration-box{
    width:min(420px,100%);
    background:var(--card);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(38,50,75,.22);
    padding:22px;
    text-align:center;
  }
  .celebration-icon{font-size:44px;line-height:1;margin-bottom:8px}
  .celebration-title{font-size:clamp(20px,5vw,28px);font-weight:900;color:var(--green);line-height:1.15}
  .celebration-text{margin-top:8px;color:var(--ink-soft);font-weight:800;line-height:1.35}
  .celebration-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .celebration-actions button{padding:10px 16px;border-radius:999px;font-weight:900}
  .celebration-close{background:var(--green);color:#fff}
  .celebration-reset{background:#eef2fa;color:var(--ink)}

  .subtoggle{display:flex;background:#eef2fa;border-radius:999px;padding:4px;gap:2px}
  .subtoggle button{padding:7px 14px;border-radius:999px;font-weight:800;font-size:14px;color:var(--ink-soft)}
  .subtoggle button.on{background:var(--purple);color:#fff}

  .question{font-weight:900;font-size:clamp(18px,4vw,24px);text-align:center}
  .letter-grid{
    width:min(760px,100%);
    display:grid;
    grid-template-columns:repeat(auto-fit,72px);
    justify-content:center;
    gap:10px;
  }
  .letter-card{
    aspect-ratio:1;
    border-radius:16px;
    background:#f2f6fc;
    color:var(--ink);
    display:grid;
    place-items:center;
    font-weight:900;
    font-size:clamp(28px,8vw,48px);
    box-shadow:var(--shadow);
  }
  @media (max-width:720px){
    .letter-grid{width:100%;grid-template-columns:repeat(auto-fit,minmax(58px,1fr))}
  }
  .letter-card.sel{background:var(--yellow);transform:rotate(-3deg)}
  .solo-letter{
    width:min(190px,52vw);
    aspect-ratio:1;
    border-radius:24px;
    background:var(--yellow);
    display:grid;
    place-items:center;
    font-weight:900;
    font-size:clamp(76px,28vw,130px);
    box-shadow:0 7px 0 rgba(38,50,75,.18);
  }
  .clue{
    width:min(520px,100%);
    background:#fff8e8;
    border:2px solid #ffd978;
    border-radius:14px;
    padding:12px 14px;
    font-weight:900;
    color:var(--ink);
    text-align:center;
    line-height:1.35;
  }

  .confetti{position:absolute;top:-20px;font-size:26px;animation:fall 1.6s ease-in forwards;pointer-events:none}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.2}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="cube" id="logoCube">С</span><span id="logoText">Слово на слово</span></div>
  <div class="spacer"></div>
  <div class="toggle" id="scriptToggle">
    <button id="sCyr" class="on">Ћир</button>
    <button id="sLat">Lat</button>
  </div>
</header>

<button class="mobile-toggle" id="modeMenuToggle" type="button"></button>
<div class="modebar">
  <div class="toggle" id="modeToggle">
    <button id="mLearn" class="on">📖 <span>Учимо</span></button>
    <button id="mLetters">🔠 <span>Абецеда</span></button>
    <button id="mLetterQuiz">🎯 <span>Квиз буква</span></button>
    <button id="mPlay">🧩 <span>Сложи реч</span></button>
    <button id="mSound">👂 <span>Погоди глас</span></button>
    <button id="mBlend">🔮 <span>Погоди реч</span></button>
    <button id="mExercises">🪞 <span>Вежбе</span></button>
  </div>
</div>

<button class="alphabet-toggle" id="alphabetToggle" type="button"></button>
<div class="alphabet" id="alphabet"></div>
<button class="words-toggle" id="wordsToggle" type="button"></button>

<main id="main">
  <aside class="wordlist" id="wordlist"></aside>
  <section class="stage" id="stage"></section>
</main>

<div class="celebration" id="celebration" role="dialog" aria-modal="true" aria-live="polite">
  <div class="celebration-box">
    <div class="celebration-icon">🎉</div>
    <div class="celebration-title" id="celebrationTitle"></div>
    <div class="celebration-text" id="celebrationText"></div>
    <div class="celebration-actions">
      <button class="celebration-close" id="celebrationClose"></button>
      <button class="celebration-reset" id="celebrationReset"></button>
    </div>
  </div>
</div>

<script>
/* ================= data ================= */
const AZBUKA = ["а","б","в","г","д","ђ","е","ж","з","и","ј","к","л","љ","м","н","њ","о","п","р","с","т","ћ","у","ф","х","ц","ч","џ","ш"];
const VOWELS = new Set(["а","е","и","о","у"]);

const LAT = {"а":"a","б":"b","в":"v","г":"g","д":"d","ђ":"đ","е":"e","ж":"ž","з":"z","и":"i","ј":"j","к":"k","л":"l","љ":"lj","м":"m","н":"n","њ":"nj","о":"o","п":"p","р":"r","с":"s","т":"t","ћ":"ć","у":"u","ф":"f","х":"h","ц":"c","ч":"č","џ":"dž","ш":"š"};

/* words stored with syllable hyphens */
const DICT = {

function dispU(cyr){ return disp(cyr).toUpperCase(); }
function dispLetter(c){ return script === "cyr" ? c.toUpperCase() : toLat(c).toUpperCase(); }
function shuffle(a){
  const r = [...a];
  for(let i = r.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
function makePicture(e){
  const wrap = document.createElement("div");
  wrap.className = "picture";
  const emo = document.createElement("div");
  emo.className = "bigemo";
  emo.textContent = e;
  wrap.appendChild(emo);
  return wrap;
}
function answerBox(item, extra){
  const div = document.createElement("div");
  div.className = "answer";
  const syl = item.syl ? " · " + dispU(item.syl.split("-").join(" · ")) : "";
  div.innerHTML = disp("реч за одрасле") + ": <b>" + dispU(item.w) + "</b>" + syl + (extra ? "<br>" + extra : "");
  return div;
}
function spacedLetters(cyrWord){ return [...cyrWord].map(ch => dispLetter(ch)).join(" - "); }
function firstSound(cyrWord){ return dispLetter([...cyrWord][0]); }
function lastSound(cyrWord){ const chars = [...cyrWord]; return dispLetter(chars[chars.length - 1]); }
function isMobile(){ return window.matchMedia("(max-width:720px)").matches; }
function loadSet(key){
  try{ return new Set(JSON.parse(localStorage.getItem(key) || "[]")); }
  catch{ return new Set(); }
}
function saveSet(key, set){ localStorage.setItem(key, JSON.stringify([...set])); }
function allWords(){ return ALL.map(x => x.w); }
function isLetterDone(letter){
  return (DICT[letter] || []).every(([syl]) => done.has(syl.replace(/-/g, "")));
}
function isAllDone(){ return allWords().every(w => done.has(w)); }
function markDone(word, letter, notify = false){
  const wasNew = !done.has(word);
  done.add(word);
  saveSet(STORAGE.done, done);
  if(wasNew && notify) checkCelebrations(letter);
}
function checkCelebrations(letter){
  if(letter && isLetterDone(letter) && !celebratedLetters.has(letter)){
    celebratedLetters.add(letter);
    saveSet(STORAGE.letters, celebratedLetters);
    queueCelebration(disp("прошли сте све речи на слово") + " " + dispLetter(letter) + "!");
  }
  if(isAllDone() && !celebratedAll){
    celebratedAll = true;
    localStorage.setItem(STORAGE.all, "1");
    queueCelebration(disp("прошли сте све речи у делу учимо!"));
  }
}
function queueCelebration(text){
  celebrationQueue.push(text);
  if(!$("celebration").classList.contains("show")) showNextCelebration();
}
function showNextCelebration(){
  const text = celebrationQueue.shift();
  if(!text) return;
  showCelebration(text);
}
function showCelebration(text){
  $("celebrationTitle").textContent = disp("честитамо!");
  $("celebrationText").textContent = text;
  $("celebrationClose").textContent = disp("настави");
  $("celebrationReset").textContent = disp("почни поново");
  $("celebrationReset").style.display = "";
  $("celebration").classList.add("show");
}
function hideCelebration(){
  $("celebration").classList.remove("show");
  showNextCelebration();
}
function resetProgress(){
  done = new Set();
  celebratedLetters = new Set();
  celebratedAll = false;
  celebrationQueue = [];
  localStorage.removeItem(STORAGE.done);
  localStorage.removeItem(STORAGE.letters);
  localStorage.removeItem(STORAGE.all);
  hideCelebration();
  renderAll();
}
function addResetButton(parent){
  if(!done.size) return;
  const reset = document.createElement("button");
  reset.className = "resetbtn";
  reset.textContent = disp("почни поново");
  reset.onclick = resetProgress;
  parent.appendChild(reset);
}
function selectWordAt(letter, index){
  const entries = DICT[letter] || [];
  if(!entries.length) return;
  const next = (index + entries.length) % entries.length;
  const [syl, e] = entries[next];
  selWord = { syl, w: syl.replace(/-/g, ""), e, letter };
  showSyll = false;
  if(isMobile()) wordListOpen = next === entries.length - 1;
  markDone(selWord.w, letter, true);
}
function selectNextLetter(){
  if(!selLetter) return;
  const start = AZBUKA.indexOf(selLetter);
  for(let step = 1; step <= AZBUKA.length; step++){
    const letter = AZBUKA[(start + step + AZBUKA.length) % AZBUKA.length];
    if((DICT[letter] || []).length){
      selLetter = letter;
      selectFirstOpenWord(letter);
      alphabetOpen = false;
      wordListOpen = true;
      return;
    }
  }
}
function selectFirstOpenWord(letter){
  const entries = DICT[letter] || [];
  if(!entries.length){
    selWord = null;
    return;
  }
  const index = entries.findIndex(([syl]) => !done.has(syl.replace(/-/g, "")));
  const [syl, e] = entries[index >= 0 ? index : 0];
  selWord = { syl, w: syl.replace(/-/g, ""), e, letter };
  showSyll = false;
  wordListOpen = true;
}
function currentWordIndex(){
  if(!selLetter || !selWord) return -1;
  return (DICT[selLetter] || []).findIndex(([syl]) => syl.replace(/-/g, "") === selWord.w);
}

/* ================= render: alphabet ================= */
function renderAlphabet(){
  const wrap = $("alphabet");
  wrap.innerHTML = "";

  AZBUKA.forEach(l => {
    const b = document.createElement("button");
    b.className = "abc";
    if(l === selLetter && mode === "learn") b.classList.add("sel");
    if(wordChars.has(l)) b.classList.add("inword");
    b.textContent = dispLetter(l);
    b.onclick = () => {
      selLetter = l;
      if(mode === "learn") selectFirstOpenWord(l);
      else selWord = null;
      showSyll = false;
      alphabetOpen = false;
      wordListOpen = true;
      if(mode === "play") startGame();
      renderAll();
    };
    wrap.appendChild(b);
  });
}

/* ================= render: word list ================= */
function renderWordlist(){
  const wrap = $("wordlist");
  wrap.innerHTML = "";
  const entries = selLetter ? (DICT[selLetter] || []) : [];
  const h = document.createElement("h2");
  h.textContent = selLetter
    ? disp("речи на слово") + " " + dispLetter(selLetter) + ` (${entries.length})`
    : disp("речи");
  wrap.appendChild(h);
  addResetButton(wrap);

  if(!selLetter){
    const p = document.createElement("div");
    p.className = "hint-empty";
    p.textContent = disp("изабери слово горе") + " 👆";
    wrap.appendChild(p);
    return;
  }
  entries.forEach(([syl, e]) => {
    const w = syl.replace(/-/g, "");
    const c = document.createElement("button");
    c.className = "chip";
    if([...w].length >= 8) c.classList.add("long");
    if([...w].length >= 11) c.classList.add("verylong");
    if(mode === "learn" && done.has(w)) c.classList.add("done");
    if(selWord && selWord.w === w) c.classList.add("sel");
    c.innerHTML = `<span class="emo">${e}</span><span class="wordtxt">${dispU(w)}</span><span class="ck">✔</span>`;
    c.onclick = () => {
      selWord = { syl, w, e, letter: selLetter };
      showSyll = false;
      if(isMobile()) wordListOpen = false;
      if(mode === "learn"){
        markDone(w, selLetter, true);
      } else {
        startGame(selWord);
      }
      renderAll();
    };
    wrap.appendChild(c);
  });
}

    [...w].forEach(ch => {

    });

  };

/* ================= game: сложи реч ================= */
function startGame(sel){
  let item;
  if(sel && sel.clue){ item = sel; }
  else if(PLAY_POOL.length){
    item = pick(PLAY_POOL);
  } else {
    item = pick(GAME_ALL);
  }
  const chars = [...item.w];
  let tiles = shuffle(chars.map((c, i) => ({c, i})));
  if(chars.length > 1 && tiles.every((t, i) => t.i === i)) tiles = shuffle(tiles);
  game = { ...item, chars, tiles, pos: 0, won: false };
  selWord = item;
}

function renderPlay(){
  const s = $("stage");
  s.innerHTML = "";
  if(!game) startGame();

  const clue = document.createElement("div");
  clue.className = "clue";
  clue.textContent = "🧩 " + disp("загонетка") + ": " + disp(game.clue);
  s.appendChild(clue);

  const boxes = document.createElement("div");
  boxes.className = "boxes";
  game.chars.forEach((ch, i) => {
    const b = document.createElement("div");
    b.className = "lbox " + (i < game.pos ? "filled" : "slot");
    b.textContent = dispLetter(ch);
    boxes.appendChild(b);
  });
  s.appendChild(boxes);
  if(game.won) s.appendChild(answerBox(game));

  if(game.won){
    const pr = document.createElement("div");
    pr.className = "praise";
    pr.textContent = "🎉 " + disp("браво!") + " " + dispU(game.w);
    s.appendChild(pr);
    const nx = document.createElement("button");
    nx.className = "nextbtn";
    nx.textContent = disp("следећа реч") + " →";
    nx.onclick = () => { startGame(); renderAll(); };
    s.appendChild(nx);
  } else {
    const tl = document.createElement("div");
    tl.className = "tiles";
    game.tiles.forEach(t => {
      const b = document.createElement("button");
      b.className = "tile" + (t.done ? " used" : "");
      b.textContent = dispLetter(t.c);
      b.onclick = () => {
        if(t.done || game.won) return;
        if(t.c === game.chars[game.pos]){
          t.done = true;
          game.pos++;
          if(game.pos === game.chars.length){
            game.won = true;
            confetti();
          }
          renderAll();
        } else {
          b.classList.add("wrong");
          setTimeout(() => b.classList.remove("wrong"), 350);
        }
      };
      tl.appendChild(b);
    });
    s.appendChild(tl);
  }

  const tip = document.createElement("div");
  tip.className = "adult";
  tip.innerHTML =
    "👩‍🏫 <b>" + disp("за одрасле") + ":</b> " +
    disp("прочитајте загонетку и пустите дете да погоди реч. затим дете слаже слова редом; ако запне, изговорите само следећи глас.");
  s.appendChild(tip);
}

/* ================= game: погоди глас (first/last sound) ================= */
function startSoundQuiz(){
  const item = pick(GAME_ALL);
  const target = soundPos === "first" ? [...item.w][0] : [...item.w][[...item.w].length - 1];
  const others = shuffle(AZBUKA.filter(l => l !== target)).slice(0, 3);
  sq = { ...item, target, options: shuffle([target, ...others]), solved: false };
}

function renderSound(){
  const s = $("stage");
  s.innerHTML = "";
  if(!sq) startSoundQuiz();

  const st = document.createElement("div");
  st.className = "subtoggle";
  const bf = document.createElement("button");
  bf.textContent = disp("први глас");
  bf.className = soundPos === "first" ? "on" : "";
  bf.onclick = () => { soundPos = "first"; startSoundQuiz(); renderAll(); };
  const bl = document.createElement("button");
  bl.textContent = disp("последњи глас");
  bl.className = soundPos === "last" ? "on" : "";
  bl.onclick = () => { soundPos = "last"; startSoundQuiz(); renderAll(); };
  st.append(bf, bl);
  s.appendChild(st);

  s.appendChild(makePicture(sq.e));

  const q = document.createElement("div");
  q.className = "question";
  q.textContent = soundPos === "first"
    ? disp("родитељ каже реч — који глас чујеш први?") + " 👂"
    : disp("родитељ каже реч — који глас чујеш последњи?") + " 👂";
  s.appendChild(q);
  s.appendChild(answerBox(sq, disp("тачан глас") + ": <b>" + dispLetter(sq.target) + "</b>"));

  if(sq.solved){
    const pr = document.createElement("div");
    pr.className = "praise";
    pr.textContent = "🎉 " + disp("браво!") + " " + dispU(sq.w);
    s.appendChild(pr);
    const nx = document.createElement("button");
    nx.className = "nextbtn";
    nx.textContent = disp("следећа реч") + " →";
    nx.onclick = () => { startSoundQuiz(); renderAll(); };
    s.appendChild(nx);
  } else {
    const tl = document.createElement("div");
    tl.className = "tiles";
    sq.options.forEach(l => {
      const b = document.createElement("button");
      b.className = "tile";
      b.textContent = dispLetter(l);
      b.onclick = () => {
        if(sq.solved) return;
        if(l === sq.target){
          sq.solved = true;
          b.classList.add("good");
          confetti();
          setTimeout(renderAll, 500);
        } else {
          b.classList.add("wrong");
          setTimeout(() => b.classList.remove("wrong"), 350);
        }
      };
      tl.appendChild(b);
    });
    s.appendChild(tl);
  }

  const tip = document.createElement("div");
  tip.className = "adult";
  tip.innerHTML =
    "👩‍🏫 <b>" + disp("за одрасле") + ":</b> " +
    (soundPos === "first"
      ? disp("кажи реч нормално, па понови са благим истезањем првог гласа: нпр. „сссат“. не додај посебан самогласник после гласа.")
      : disp("кажи реч нормално, па понови са благим задржавањем последњег гласа: нпр. „но-ссс“ или „ми-шшш“."));
  s.appendChild(tip);
}

  bq = { ...item, options: shuffle([item, ...others]), solved: false };
}

  list.appendChild(warm);

  const breath = document.createElement("div");
  breath.className = "exercise-card";
  breath.innerHTML =
    "<h3>❄️ " + disp("дисање за говор: пахуљица") + "</h3>" +
    "<p>" + disp("узмите комадић вате и растресите га као пахуљицу. дете је ветар који помера пахуљицу по столу.") + "</p>" +
    "<p><b>" + disp("како дува") + ":</b> " +
    disp("усне су округле, издах је гладак и миран, без надувавања образа.") + "</p>" +
    "<p><b>" + disp("како удише") + ":</b> " +
    disp("удах иде кроз нос, па поново дуг и тих издах кроз уста.") + "</p>";
  list.appendChild(breath);

  const gameTip = document.createElement("div");
  gameTip.className = "exercise-card";
  gameTip.innerHTML =
    "<h3>👂 " + disp("мали савет пре игара") + "</h3>" +
    "<p>" + disp("прво реците целу реч природно. затим је поновите спорије и покажите прстом слово или слог који дете треба да чује.") + "</p>" +
    "<p>" + disp("ако дете греши, не исправљајте дуго: понудите модел, похвалите покушај и пробајте следећу реч.") + "</p>";
  list.appendChild(gameTip);

  s.appendChild(list);
}

/* ================= confetti ================= */
function confetti(){
  const s = $("stage");
  const emos = ["🎉","⭐","🎈","✨","🟡","🔵"];
  for(let i = 0; i < 18; i++){
    const d = document.createElement("div");
    d.className = "confetti";
    d.textContent = emos[i % emos.length];
    d.style.left = Math.random() * 95 + "%";
    d.style.animationDelay = (Math.random() * .5) + "s";
    s.appendChild(d);
    setTimeout(() => d.remove(), 2200);
  }
}

/* ================= toggles ================= */
$("sCyr").onclick = () => { script = "cyr"; syncToggles(); renderAll(); };
$("sLat").onclick = () => { script = "lat"; syncToggles(); renderAll(); };
$("mLearn").onclick = () => setMode("learn");
$("mLetters").onclick = () => setMode("letters");
$("mLetterQuiz").onclick = () => setMode("letterquiz");
$("mPlay").onclick = () => setMode("play");
$("mSound").onclick = () => setMode("sound");
$("mBlend").onclick = () => setMode("blend");
$("mExercises").onclick = () => setMode("exercises");
$("modeMenuToggle").onclick = () => {
  modeMenuOpen = !modeMenuOpen;
  syncToggles();
};
$("alphabetToggle").onclick = () => {
  alphabetOpen = !alphabetOpen;
  syncToggles();
};
$("wordsToggle").onclick = () => {
  wordListOpen = !wordListOpen;
  syncToggles();
};
$("celebrationClose").onclick = hideCelebration;
$("celebrationReset").onclick = resetProgress;
$("celebration").onclick = e => {
  if(e.target.id === "celebration") hideCelebration();
};

function setMode(m){
  mode = m;
  if(isMobile()) modeMenuOpen = false;
  if(m === "play"){
    startGame();
  }
  if(m === "letterquiz") startLetterQuiz();
  if(m === "sound") startSoundQuiz();
  if(m === "blend") startBlendQuiz();
  if(m === "exercises"){
    game = null;
    sq = null;
    bq = null;
  }
  syncToggles();
  renderAll();
}

function syncToggles(){
  $("sCyr").classList.toggle("on", script === "cyr");
  $("sLat").classList.toggle("on", script === "lat");
  $("sCyr").textContent = script === "cyr" ? "Ћир" : "Cyr";
  $("sLat").textContent = script === "cyr" ? "Лат" : "Lat";
  $("mLearn").classList.toggle("on", mode === "learn");
  $("mLetters").classList.toggle("on", mode === "letters");
  $("mLetterQuiz").classList.toggle("on", mode === "letterquiz");
  $("mPlay").classList.toggle("on", mode === "play");
  $("mSound").classList.toggle("on", mode === "sound");
  $("mBlend").classList.toggle("on", mode === "blend");
  $("mExercises").classList.toggle("on", mode === "exercises");
  $("mLearn").querySelector("span").textContent = disp("учимо");
  $("mLetters").querySelector("span").textContent = disp("абецеда");
  $("mLetterQuiz").querySelector("span").textContent = disp("квиз буква");
  $("mPlay").querySelector("span").textContent = disp("сложи реч");
  $("mSound").querySelector("span").textContent = disp("погоди глас");
  $("mBlend").querySelector("span").textContent = disp("погоди реч");
  $("mExercises").querySelector("span").textContent = disp("вежбе");
  $("logoText").textContent = disp("слово на слово").replace(/^./, c => c.toUpperCase());
  $("logoCube").textContent = script === "cyr" ? "С" : "S";
  $("modeMenuToggle").textContent = (modeMenuOpen ? "▴ " : "▾ ") + disp("режими") + ": " + activeModeName();
  $("modeMenuToggle").style.display = "";
  document.querySelector(".modebar").classList.toggle("collapsed", !modeMenuOpen);
  $("main").classList.toggle("nolist", mode === "letters" || mode === "letterquiz" || mode === "play" || mode === "sound" || mode === "blend" || mode === "exercises");
  $("main").classList.toggle("learnmode", mode === "learn");
  $("wordlist").style.display = (mode === "letters" || mode === "letterquiz" || mode === "play" || mode === "sound" || mode === "blend" || mode === "exercises") ? "none" : "";
  $("wordsToggle").style.display = mode === "learn" && selLetter ? "" : "none";
  $("wordsToggle").textContent = (wordListOpen ? "▴ " : "▾ ") + disp(wordListOpen ? "сакриј речи" : "прикажи речи");
  $("wordlist").classList.toggle("collapsed", !wordListOpen);
  $("alphabetToggle").style.display = (mode === "letters" || mode === "letterquiz" || mode === "play" || mode === "exercises") ? "none" : "";
  $("alphabetToggle").textContent = (alphabetOpen ? "▴ " : "▾ ") + disp(alphabetOpen ? "сакриј азбуку" : "прикажи азбуку");
  $("alphabet").style.display = (mode === "letters" || mode === "letterquiz" || mode === "play" || mode === "exercises") ? "none" : "";
  $("alphabet").classList.toggle("collapsed", !alphabetOpen);
}
function activeModeName(){
  const names = {learn:"учимо", letters:"абецеда", letterquiz:"квиз буква", play:"сложи реч", sound:"погоди глас", blend:"погоди реч", exercises:"вежбе"};
  return disp(names[mode]);
}

/* ================= boot ================= */
function renderAll(){
  renderAlphabet();
  renderWordlist();
  if(mode === "learn") renderLearn();
  else if(mode === "letters") renderLetters();
  else if(mode === "letterquiz") renderLetterQuiz();
  else if(mode === "play") renderPlay();
  else if(mode === "sound") renderSound();
  else if(mode === "blend") renderBlend();
  else renderExercises();
}
syncToggles();
renderAll();
</script>
